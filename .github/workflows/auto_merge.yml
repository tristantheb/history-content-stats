name: CI | Auto merge pull requests

on:
  pull_request:
    types:
      - labeled
    branches:
      - sync/update-repositories-data
      - sync/update-statistics-data

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest

    steps:
      - name: Auto merge pull request
        uses: pascalgn/automerge-action@7961b8b5eec56cc088c140b56d864285eabd3f67 #v0.16.4
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          MERGE_LABELS: "automated-pr"
          MERGE_METHOD: "squash"
          UPDATE_METHOD: "rebase"
